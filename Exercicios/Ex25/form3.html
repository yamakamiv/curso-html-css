<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
	<style>
		*{font-family:Arial, Helvetica,sans-serif;
		}
	</style>
</head>
<body>
	<h1>Teste de Formulario</h1>
	<form action="cadastro.php" method="get" autocomplete="on">
		<fieldset>
            <legend>Dados Pessoais</legend>
            <p><label for="inome">Nome: </label>
            <input type="text" name="nome" id="inome" required maxlength="40" placeholder="Nome completo" autocomplete="name"></p>

            <p><input type="radio" name="sexo" id="isxmas"> <label for="isxmas">Masculino</label></p>
            <p><input type="radio" name="sexo" id="isxfem"><label for="isexfem">Feminino</label></p>
            
            <p><label for="iemail">E-mail: </label>
            <input type="email" name="email" id="iemail" autocomplete="email" required placeholder="exemplo@e-mail.com"></p>
    
            <p><label for="itel">Telefone: </label>
            <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="\([0-9]{2}\)[0-9]{4,6}-[0-9]{4}" placeholder="(xx)xxxx-xxxx"></p>
        </fieldset>

		<fieldset>
            <legend>Dados Escolares</legend>
            <p><label for="imedia">Média: </label>
            <input type="number" name="media" id="imedia" required min="0" max="10" step="0.1" value="5" placeholder="0 a 10"></p>
            
            <!--Ao colocar um valor em value automaticammente apagara o placeholder -->
            <p><label for="imes">Período Letivo: </label>
            <input type="month" name="mes" id="imes" value="2026-06"></p>
            <p><label for="idia">Dia da Prova: </label>
            <input type="date" name="dia" id="idia" value="2026-06-24"></p>
            <p><label for="ihora">Horário da Prova: </label>
            <input type="time" nome="hora" id="ihora"></p>
        </fieldset>

        <fieldset>
            <legend>Esportes Favoritos</legend>
            <input type="checkbox" name="esbas" id="iesbas"> <label for="iesbas">Basquete</label> <br>
            <input type="checkbox" name="esfut" id="iesfut"> <label for="iesfut">Futebol</label> <br>
            <input type="checkbox" name="esnat" id="iesnat"> <label for="iesnat">Natação</label> <br>
            <input type="checkbox" name="esten" id="iesten"> <label for="iesten">Tênis</label> <br>
        </fieldset>

		<p><input type="submit" value="Enviar">
		<input type="reset" value="Limpar"></p>
	</form>
</body>
</html>
