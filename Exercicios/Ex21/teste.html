<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entendendo caixa</title>
    <style>
        h1{
            text-align: center;
            width: 300px;
            height: 50px;
            background-color: grey;
               /*
            O tamanho da largura e altura é apenas da caixa de texto sem incluir borda, margem, outline e padding.
            */
            border-width: 10px;
            border-style: solid;
            border-color: red;
            /*
            Shorthand Border
            border: 10px solid red;
            */
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            /*
            Shorthand Padding
            padding: 10px;
            */
            outline-width: 30px;
            outline-style: solid;
            outline-color: blue;
            /*
            Shorthand Outline
            outline: 30px solid blue;
            */
            margin-top: 50px;
            margin-right: 50px;
            margin-bottom: 50px;
            margin-left: 50px;
            /*
            Shorthand Margin
            margin: 50px;
            */

        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa</h1>
</body>
</html>
