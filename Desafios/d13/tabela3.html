<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 13 part 3</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 400px;
            border-collapse: collapse;
        }
        td, th{
            border: 1px solid black;
            padding: 5px;
        }
        thead th{
            background-color: grey;
            color: white;
        }
        .numero{
            text-align: center;
        }
        .media{
            text-align: center;
            background-color: grey;
            color: white;
        }
        tbody th{
            background-color: gray;
            color: white;
            text-align: left;
            font-weight: normal;
        }
        th.comum{
            background-color: white;
            color: black;
            font-weight: bold;
        }
    </style>
</head>

    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr>
                <th>Nota 1</th>
                <th>Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>

                <td class="numero">0.0</td>

            </tr>
            <tr>
                <td>Fisica</td>

                <td class="numero">0.0</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td class="numero">0.0</td>
                <td class="numero">0.0</td>
                <td class="numero">0.0</td>
            </tr>
            <tr>
                <th colspan="4" scope="row">Média de Exatas</th>
                <td class="media">0.0</td>
            </tr>
            <tr>
                <th class="comum" rowspan="2" scope="rowgroup">Humanas</th>
                <td>História</td>
                <td class="numero">0.0</td>
                <td class="numero">0.0</td>
                <td class="numero">0.0</td>

            <tr>
                <td>Geografia</td>

                <td class="numero">0.0</td>

            </tr>
            <tr>

            </tr>
        </tbody>
    </table>

</html>
